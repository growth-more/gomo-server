name: CI/CD for Growth More Backend

on:
  push:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Seoul

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check timezone
        run: date

      - name: Create Application.yml
        run: |
          echo "${{ secrets.APPLICATION_PROD }}" > ./src/main/resources/application.yml
          echo "${{ secrets.APPLICATION_TEST }}" > ./src/test/resources/application.yml
        shell: bash

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Save Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/libs/

      - name: Check Download Artifact Successfully
        run: |
          ls -lh build/libs/

      - name: Setting Env Variable
        run: |
          if [[ "${{github.ref_name}}" == "main" ]]; then
            echo "PROFILE=prod" >> $GITHUB_ENV
          else
            echo "PROFILE=dev" >> $GITHUB_ENV
          fi

      - name: Create SSH Key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_key.key
          chmod 600 oci_key.key

      - name: Transfer application, configuration & Docker Compose files to Server
        run: |
          scp -i oci_key.key -o StrictHostKeyChecking=no build/libs/app-0.0.1-SNAPSHOT.jar ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/home/ubuntu/project/gomo/api/${{ env.PROFILE }}/app-0.0.1-SNAPSHOT.jar

      - name: Deploy
        run: |
          ssh -i oci_key.key -o StrictHostKeyChecking=no ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} << 'EOF'
            cd /home/ubuntu/project/gomo/api/
            docker compose -f docker-compose.${{ env.PROFILE }}.yml down || true
            docker compose -f docker-compose.${{ env.PROFILE }}.yml up --build -d
          EOF